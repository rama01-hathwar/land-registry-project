<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>GIS Land Registry System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #map {
            width: 75%;
            height: 100%;
        }

        #sidebar {
            width: 25%;
            padding: 15px;
            background: #f4f4f4;
            overflow-y: auto;
        }

        #priceBox {
            font-size: 20px;
            font-weight: bold;
            color: green;
        }

        /* 🔥 blinking effect */
        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }

            100% {
                opacity: 1;
            }
        }

        .blink {
            animation: blink 1s infinite;
        }

        /* Legend */
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .legend-box {
            width: 15px;
            height: 15px;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">GIS Land Registry System</h2>

    <div id="container">
        <div id="map"></div>

        <div id="sidebar">
            <h3>Search Parcel</h3>
            <input type="text" id="searchId">
            <button onclick="searchLand()">Search</button>

            <h3>Land Details</h3>
            <div id="details">Click a parcel</div>

            <h3>Predicted Price</h3>
            <div id="priceBox">Click a parcel</div>

            <h3>QR Code</h3>
            <div id="qrSection"></div>

            <h3>📤 Upload Document</h3>

            <input type="text" id="docParcel" placeholder="Parcel ID"><br><br>

            <select id="docType">
               <option value="Sale Deed">Sale Deed</option>
               <option value="Tax Receipt">Tax Receipt</option>
               <option value="Transfer Deed">Transfer Deed</option>
                </select><br><br>

            <input type="file" id="docFile"><br><br>

             <button onclick="uploadDocument()">Upload</button>

              <div id="uploadStatus"></div>

            <h3>Nearby Lands</h3>
            <div id="nearby"></div>

            <h3>📄 Documents</h3>
            <div id="documents">Click a parcel</div>
        </div>
    </div>

    <!-- Legend -->
    <div id="legend">
        <b>Land Type</b><br>
        <div><span class="legend-box" style="background:green"></span> Residential</div>
        <div><span class="legend-box" style="background:red"></span> Commercial</div>
        <div><span class="legend-box" style="background:orange"></span> Agricultural</div>

        <hr>
        <b>Status</b><br>
        <div><span class="legend-box" style="background:yellow"></span> For Sale</div>
        <div><span class="legend-box" style="background:black"></span> Disputed</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Map
        var map = L.map('map').setView([12.97, 77.75], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let allLands = [];

        // Land type color
        function getLandColor(type) {
            type = (type || "").toLowerCase();

            if (type === "residential") return "green";
            if (type === "commercial") return "red";
            if (type === "agricultural") return "orange";
            return "blue";
        }

        // Distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;

            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        // MAIN CLICK
        function handleLandClick(land, marker = null) {

            map.flyTo([land.lat, land.lon], 18);

            showDetails(land);
            showQR(land);
            document.getElementById("docParcel").value = land.parcel_id;
            loadNearby(land);
            loadDocuments(land);

            fetch("/predict_price", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    area_sqft: land.area,
                    road_distance_km: 2,
                    city_distance_km: 5,
                    nearby_school: "Yes",
                    nearby_hospital: "No",
                    year: 2024
                })
            })
                .then(res => res.json())
                .then(result => {

                    let price = result.predicted_price || 0;

                    document.getElementById("priceBox").innerHTML = `₹ ${price}`;

                    if (marker) {
                        marker.bindPopup(`
                <b>${land.parcel_id}</b><br>
                ₹${price}
            `).openPopup();
                    }

                });
        }

        // LOAD DATA
        fetch("/api/land")
            .then(res => res.json())
            .then(data => {

                allLands = data;

                data.forEach(land => {

                    let baseColor = getLandColor(land.type);

                    let style = {
                        color: baseColor,
                        fillColor: baseColor,
                        fillOpacity: 0.4,
                        weight: 2
                    };

                    // 🔥 FOR SALE
                    if (land.status === "for sale") {
                        style.color = "yellow";
                        style.dashArray = "5,5";
                    }

                    // 🔥 DISPUTED
                    if (land.status === "disputed") {
                        style.color = "black";
                    }

                    let poly = L.polygon(land.polygon, style).addTo(map);

                    // 🔥 blinking for disputed
                    if (land.status === "disputed") {
                        let el = poly.getElement();
                        if (el) el.classList.add("blink");
                    }

                    let marker = L.marker([land.lat, land.lon]).addTo(map);

                    marker.on("click", () => {
                        handleLandClick(land, marker);
                    });

                    poly.on("click", () => {
                        handleLandClick(land, marker);
                    });

                });

            });

        // Sidebar
        function showDetails(land) {
            document.getElementById("details").innerHTML =
                `ID: ${land.parcel_id}<br>
         Owner: ${land.owner}<br>
         Type: ${land.type}<br>
         Status: ${land.status}<br>
         Area: ${land.area}`;
        }

        // QR
        function showQR(land) {
            document.getElementById("qrSection").innerHTML =
                `<img src="/qr/${land.parcel_id}" width="120">`;
        }

        // Nearby
        function loadNearby(land) {
            let html = "";
            let found = false;

            allLands.forEach(o => {
                if (o.parcel_id !== land.parcel_id) {
                    let d = getDistance(land.lat, land.lon, o.lat, o.lon);
                    if (d < 1) {
                        found = true;
                        html += `${o.parcel_id} (${d.toFixed(2)} km)<br>`;
                    }
                }
            });

            document.getElementById("nearby").innerHTML =
                found ? html : "No nearby lands";
        }

        // Search
        function searchLand() {
            let id = document.getElementById("searchId").value;
            let land = allLands.find(l => l.parcel_id === id);

            if (land) handleLandClick(land);
            else alert("Not found");
        }

        function loadDocuments(landId) {
    fetch(`/documents/${landId}`)
        .then(response => response.json())
        .then(data => {
            let container = document.getElementById("documents");

            if (!data || data.length === 0) {
                container.innerHTML = "<p>No documents found</p>";
                return;
            }

            let html = "<ul>";

            data.forEach(doc => {
                html += `
                    <li>
                        📄 ${doc.document_type} 
                        (${doc.status})
                        <br>
                        <a href="https://land-registry-project.onrender.com${doc.view_url}" target="_blank">
                            View Document
                        </a>
                    </li>
                `;
            });

            html += "</ul>";

            container.innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById("documents").innerHTML =
                "<p style='color:red;'>Error loading documents</p>";
        });
}

        function uploadDocument(){

    let parcel = document.getElementById("docParcel").value;
    let type = document.getElementById("docType").value;
    let file = document.getElementById("docFile").files[0];

    if(!parcel || !file){
        alert("Fill all fields");
        return;
    }

    let formData = new FormData();
    formData.append("parcel_id", parcel);
    formData.append("document_type", type);
    formData.append("uploaded_by", "U001");
    formData.append("file", file);

    fetch("/upload_document", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("uploadStatus").innerHTML = "✅ Uploaded";
    })
    .catch(err => {
        document.getElementById("uploadStatus").innerHTML = "❌ Error";
    });
}

    </script>

</body>

</html>
