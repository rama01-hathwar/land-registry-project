<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GIS Land Registry System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }

#container {
    display: flex;
    height: 100vh;
}

#map {
    width: 75%;
    height: 100%;
}

#sidebar {
    width: 25%;
    padding: 15px;
    background: #f4f4f4;
    overflow-y: auto;
}
</style>
</head>

<body>

<h2 style="text-align:center;">GIS Land Registry System</h2>

<div id="container">
    <div id="map"></div>

    <div id="sidebar">
        <h3>Search Parcel</h3>
        <input type="text" id="searchId" placeholder="Enter Parcel ID">
        <button onclick="searchLand()">Search</button>

        <h3>Land Details</h3>
        <div id="details">Click a parcel</div>

        <h3>QR Code</h3>
        <div id="qrSection">Click a parcel</div>

        <h3>Nearby Lands</h3>
        <div id="nearby">Click a parcel</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🗺 Map init
var map = L.map('map').setView([12.97, 77.75], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allLands = [];
let nearbyMarkers = [];

// 🌍 Map layers
var normalMap = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

var satelliteMap = L.tileLayer(
    'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'
);

// Add default
normalMap.addTo(map);

// Layer control
var baseMaps = {
    "Normal Map": normalMap,
    "Satellite Map": satelliteMap
};

L.control.layers(baseMaps).addTo(map);

// 🎨 Color
function getColor(type, status) {

    type = type.toLowerCase();
    status = status ? status.toLowerCase() : "";

    if (status === "disputed") return "black";

    if (type === "residential") return "green";
    if (type === "commercial") return "red";
    if (type === "agricultural") return "orange";

    return "blue";
}

// 🚀 Fetch Data
// 🚀 Fetch Data
fetch("/api/land")
.then(res => res.json())
.then(data => {

    allLands = data;

    if (data.length > 0) {
        map.setView([data[0].lat, data[0].lon], 14);
    }

    data.forEach(land => {

        // 📍 Marker
        if (land.lat && land.lon) {

            let marker = L.marker([land.lat, land.lon])
                .addTo(map)
                .bindPopup(`<b>Land ID:</b> ${land.parcel_id}`);

            marker.on("click", function () {

    zoomToLand(land);
    showDetails(land);
    showQR(land);
    loadNearby(land);

    // 🔥 ML Prediction
    fetch("http://127.0.0.1:5000/predict_price", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            area_sqft: land.area,
            road_distance_km: 2,
            city_distance_km: 5,
            nearby_school: "Yes",
            nearby_hospital: "No",
            year: 2024,

            // ⚠️ If your model uses these (recommended)
            district: land.district || "Unknown",
            state: land.state || "Unknown",
            land_type: land.type || "residential"
        })
    })
    .then(res => res.json())
    .then(data => {

        marker.bindPopup(`
            <b>Land ID:</b> ${land.parcel_id}<br>
            <b>Predicted Price:</b> ₹${data.predicted_price}
        `).openPopup();

    })
    .catch(err => console.error(err));
});
        }

        // ✅ Polygon
        if (land.polygon && land.polygon.length > 0) {

            let coords = land.polygon;

            // close polygon
            if (coords.length > 0 &&
                (coords[0][0] !== coords[coords.length - 1][0] ||
                 coords[0][1] !== coords[coords.length - 1][1])) {

                coords.push(coords[0]);
            }

            let poly = L.polygon(coords, {
                color: getColor(land.type, land.status),
                weight: 2,
                fillOpacity: 0.4
            }).addTo(map);

            poly.on("click", function () {
                map.fitBounds(poly.getBounds());
                showDetails(land);
                showQR(land);
                loadNearby(land);
            });
        }

    }); // ✅ CLOSE forEach

}) // ✅ CLOSE then
.catch(err => console.error(err)); // ✅ ERROR HANDLER
        
        // ✅ Polygon
if (land.polygon && land.polygon.length > 0) {

    let coords = land.polygon;

    // ✅ Ensure polygon is closed
    if (coords.length > 0 &&
        (coords[0][0] !== coords[coords.length - 1][0] ||
         coords[0][1] !== coords[coords.length - 1][1])) {

        coords.push(coords[0]);
    }

    let poly = L.polygon(coords, {
        color: getColor(land.type, land.status),
        weight: 2,
        fillOpacity: 0.4
    }).addTo(map);

    // ✅ Click event (zoom + details)
    poly.on("click", function () {
        map.fitBounds(poly.getBounds());   // 🔥 zoom fix
        showDetails(land);
        showQR(land);
        loadNearby(land);
    });
}


// 🔍 Zoom
function zoomToLand(land) {

    if (land.lat && land.lon) {
        map.setView([land.lat, land.lon], 18);
    }

    if (land.polygon && land.polygon.length > 0) {

        let bounds = L.latLngBounds(
            land.polygon.map(p => [p[0], p[1]])
        );

        map.fitBounds(bounds);
    }
}

// 📄 Details
function showDetails(land){
    document.getElementById("details").innerHTML =
        `<b>Parcel ID:</b> ${land.parcel_id}<br>
         <b>Owner:</b> ${land.owner}<br>
         <b>Type:</b> ${land.type}<br>
         <b>Area:</b> ${land.area} sq ft<br>
         <b>Survey:</b> ${land.survey}`;
}

// 📱 QR (FIXED)
function showQR(land){
    document.getElementById("qrSection").innerHTML = `
        <img src="https://land-registry-project.onrender.com/qr/${land.parcel_id}" width="150">
        <a href="https://land-registry-project.onrender.com/verify/${land.parcel_id}" target="_blank">
            Verify Property
        </a>
    `;
}

// 📏 Distance
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

// 📍 Nearby (FIXED)
function loadNearby(land){

    // remove old markers
    nearbyMarkers.forEach(m => map.removeLayer(m));
    nearbyMarkers = [];

    let html = "";
    let found = false;

    allLands.forEach(other => {

        const distance = getDistance(
            land.lat, land.lon,
            other.lat, other.lon
        );

        if (distance < 1 && other.parcel_id !== land.parcel_id) {

            found = true;

            html += `Parcel: ${other.parcel_id} (${distance.toFixed(2)} km)<br>`;

            let marker = L.marker([other.lat, other.lon], {
                icon: L.icon({
                    iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
                    iconSize: [25, 25]
                })
            }).addTo(map);

            nearbyMarkers.push(marker);
        }
    });

    if(!found){
        html = "No nearby lands";
    }

    document.getElementById("nearby").innerHTML = html;
}

// 🔎 Search
function searchLand(){

    let id = document.getElementById("searchId").value.trim();

    let found = allLands.find(l => l.parcel_id === id);

    if(found){
        zoomToLand(found);
        showDetails(found);
        showQR(found);
        loadNearby(found);
    } else {
        alert("Parcel not found");
    }
}

</script>

</body>
</html>
