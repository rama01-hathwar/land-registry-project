<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GIS Land Registry System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }

#container { display: flex; height: 100vh; }

#map { width: 75%; height: 100%; }

#sidebar {
    width: 25%;
    padding: 15px;
    background: #f4f4f4;
    overflow-y: auto;
}

#priceBox {
    font-size: 20px;
    font-weight: bold;
    color: green;
}

/* 🔥 Legend */
#legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: white;
    padding: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}
.legend-box {
    width: 15px;
    height: 15px;
    display: inline-block;
    margin-right: 5px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">GIS Land Registry System</h2>

<div id="container">
    <div id="map"></div>

    <div id="sidebar">
        <h3>Search Parcel</h3>
        <input type="text" id="searchId">
        <button onclick="searchLand()">Search</button>

        <h3>Land Details</h3>
        <div id="details">Click a parcel</div>

        <h3>Predicted Price</h3>
        <div id="priceBox">Click a parcel</div>

        <h3>QR Code</h3>
        <div id="qrSection"></div>

        <h3>Nearby Lands</h3>
        <div id="nearby"></div>
    </div>
</div>

<!-- 🔥 Legend -->
<div id="legend">
    <b>Price Range</b><br>
    <div><span class="legend-box" style="background:green"></span> Low</div>
    <div><span class="legend-box" style="background:orange"></span> Medium</div>
    <div><span class="legend-box" style="background:red"></span> High</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🗺 Map
var map = L.map('map').setView([12.97, 77.75], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allLands = [];

// 🎨 Price color
function getPriceColor(price) {
    if (price < 500000) return "green";
    if (price < 1500000) return "orange";
    return "red";
}

// 🔥 MAIN FUNCTION
function handleLandClick(land, marker=null, poly=null){

    // Zoom
    if (land.lat && land.lon) {
        map.flyTo([land.lat, land.lon], 18);
    }

    if (land.polygon) {
        map.fitBounds(land.polygon.map(p => [p[0], p[1]]));
    }

    // Sidebar
    showDetails(land);
    showQR(land);
    loadNearby(land);

    // Prediction
    fetch("/predict_price", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            area_sqft: land.area,
            road_distance_km: 2,
            city_distance_km: 5,
            nearby_school: "Yes",
            nearby_hospital: "No",
            year: 2024
        })
    })
    .then(res=>res.json())
    .then(result=>{

        let price = result.predicted_price || 0;

        document.getElementById("priceBox").innerHTML =
            `₹ ${price}`;

        let color = getPriceColor(price);

        if(marker){
            marker.bindPopup(`
                <b>${land.parcel_id}</b><br>
                Price: ₹${price}
            `).openPopup();
        }

        if(poly){
            poly.setStyle({
                color: color,
                fillColor: color
            });
        }

    })
    .catch(err=>console.error(err));
}

// 🚀 LOAD DATA + AUTO COLOR
fetch("/api/land")
.then(res=>res.json())
.then(data=>{

    allLands = data;

    data.forEach(land=>{

        let marker=null, poly=null;

        // Marker
        if(land.lat && land.lon){
            marker = L.marker([land.lat, land.lon]).addTo(map);

            marker.on("click", function(){
                handleLandClick(land, marker, poly);
            });
        }

        // Polygon
        if(land.polygon){
            poly = L.polygon(land.polygon, {
                color: "gray",
                fillOpacity: 0.4
            }).addTo(map);

            poly.on("click", function(){
                handleLandClick(land, marker, poly);
            });
        }

        // 🔥 AUTO COLOR (without clicking)
        fetch("/predict_price", {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                area_sqft: land.area,
                road_distance_km: 2,
                city_distance_km: 5,
                nearby_school: "Yes",
                nearby_hospital: "No",
                year: 2024
            })
        })
        .then(res=>res.json())
        .then(result=>{

            let price = result.predicted_price || 0;
            let color = getPriceColor(price);

            if(poly){
                poly.setStyle({
                    color: color,
                    fillColor: color
                });
            }

        });

    });

});

// 📄 Details
function showDetails(land){
    document.getElementById("details").innerHTML =
        `ID: ${land.parcel_id}<br>
         Owner: ${land.owner}<br>
         Area: ${land.area}`;
}

// 📱 QR
function showQR(land){
    document.getElementById("qrSection").innerHTML =
        `<img src="/qr/${land.parcel_id}" width="120">`;
}

// 📍 Nearby
function loadNearby(land){
    document.getElementById("nearby").innerHTML = "Loading...";
}

// 🔎 Search
function searchLand(){
    let id = document.getElementById("searchId").value;
    let land = allLands.find(l=>l.parcel_id===id);

    if(land){
        handleLandClick(land);
    }else{
        alert("Not found");
    }
}

</script>

</body>
</html>
