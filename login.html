<!DOCTYPE html>
<html>
<head>
<title>LandChain Login</title>
<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#2563eb,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
}
input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
}
button {
    background:#2563eb;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>LandChain</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>

</div>

</body>
</html>
